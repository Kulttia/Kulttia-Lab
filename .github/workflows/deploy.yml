name: 🚀 Deploy Kulttia Lab → Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout código
        uses: actions/checkout@v4

      - name: 📤 Deploy a Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.kulttia.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          server-dir: /public_html/
          local-dir: ./
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            fix-footer.js
            fix-flash.js
            update.js
            README.md
